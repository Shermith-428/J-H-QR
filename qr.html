<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>J & H</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: #6b1226;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #7a1528;
      border: 1.5px solid rgba(220, 210, 190, 0.5);
      border-radius: 4px;
      padding: 44px 40px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 0 60px rgba(0,0,0,0.15);
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(220, 210, 190, 0.25);
      border-radius: 2px;
      pointer-events: none;
    }
    .swan { font-size: 42px; margin-bottom: 10px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3)); }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 600;
      color: #e8dfc8;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .date {
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: rgba(220, 210, 190, 0.6);
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    #qrcode {
      display: inline-block;
      padding: 12px;
      background: #e8dfc8;
      border-radius: 4px;
    }
    .url { margin-top: 14px; font-size: 0.75rem; color: rgba(220,210,190,0.4); word-break: break-all; max-width: 280px; }
    .download-btn {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 28px;
      background: transparent;
      color: #e8dfc8;
      border: 1px solid rgba(220, 210, 190, 0.5);
      border-radius: 4px;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
    }
    .download-btn:hover { background: rgba(220, 210, 190, 0.1); }
  </style>
</head>
<body>
  <div class="card">
    <div class="swan">🦢</div>
    <h1>J & H</h1>
    <div class="date">August 8, 2026</div>
    <div id="qrcode"></div>
    <div class="url" id="urlLabel"></div>
    <br/>
    <a class="download-btn" id="downloadBtn">⬇ Download QR Code</a>
  </div>

  <script>
    const donationURL = "https://h-j.netlify.app/";

    new QRCode(document.getElementById("qrcode"), {
      text: donationURL,
      width: 240,
      height: 240,
      colorDark: "#000000",
      colorLight: "#ffffff",
    });

    document.getElementById("urlLabel").textContent = donationURL;

    setTimeout(() => {
      const qrCanvas = document.querySelector("#qrcode canvas");

      document.getElementById("downloadBtn").addEventListener("click", () => {
        const link = document.createElement("a");
        link.download = "J&H-QRCode.png";
        link.href = qrCanvas.toDataURL("image/png");
        link.click();
      });
    }, 500);
  </script>
</body>
</html>
